name: ReRoot
options:
  bundleIdPrefix: com.tryquit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_BITCODE: false
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  ReRoot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: ReRoot
        NSLocationWhenInUseUsageDescription: "ReRoot uses your location to find nearby addiction treatment centers, counselors, and support groups so you can get help when you need it most."
        NSLocationAlwaysAndWhenInUseUsageDescription: "ReRoot uses your location to find nearby addiction treatment centers and support groups."
        NSMicrophoneUsageDescription: "ReRoot uses the microphone for voice memo journaling during check-ins. Recordings stay on your device."
        NSSpeechRecognitionUsageDescription: "ReRoot uses speech recognition to understand your voice memos during check-ins. All processing stays on your device."
        NSHealthShareUsageDescription: "ReRoot reads your Heart Rate Variability and sleep data to detect stress signals before cravings escalate — a technique called a Just-In-Time Adaptive Intervention (JITAI)."
        NSHealthUpdateUsageDescription: "ReRoot does not write any data to Apple Health."
        UILaunchScreen:
          UIColorName: "AccentColor"
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Light
        LSApplicationQueriesSchemes:
          - fitness
          - fitnessapp
          - apple-health
          - x-apple-health
    entitlements:
      path: Sources/ReRoot.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - sdk: HealthKit.framework
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.tryquit.reroot
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
      SUPPORTS_MACCATALYST: false
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic

schemes:
  ReRoot:
    build:
      targets:
        ReRoot: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
